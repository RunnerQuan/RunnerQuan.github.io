    <circle cx="405" cy="117" r="8" fill="#787878" stroke="#f5f5f5" stroke-width="5"/>
    <rect x="366" y="92" width="9" height="9" fill="#8d8d8d"/>
    <rect x="377" y="103" width="9" height="9" fill="#8d8d8d"/>
    <path d="M418 157h24M430 145v24" stroke="#8d8d8d" stroke-width="7"/>
  </g>

  <g fill="#ffffff">
    <path d="M128 171h11v-11h9v11h11v9h-11v11h-9v-11h-11z"/>
    <rect x="119" y="246" width="10" height="10"/>
    <rect x="153" y="335" width="8" height="8"/>
    <rect x="315" y="327" width="9" height="9"/>
    <rect x="353" y="274" width="8" height="8"/>
    <path d="M177 359h8v-9h7v9h9v7h-9v9h-7v-9h-8z"/>
  </g>

  <path d="M151 179H302L337 214V263L303 296H245L345 396H278L207 325V396H151V256H267L282 241V225L267 211H151Z" fill="#ffffff"/>
  <path d="M305 316H358V365H391V409H347L347 391H305Z" fill="#ffffff"/>
  <rect x="347" y="360" width="27" height="27" fill="#050505"/>

  <path d="M62 334C147 400 348 405 454 308" fill="none" stroke="#ffffff" stroke-width="13" stroke-linecap="round"/>
  <path d="M53 340C17 368 21 396 76 407C167 426 367 386 475 290" fill="none" stroke="#ffffff" stroke-width="13" stroke-linecap="round"/>
