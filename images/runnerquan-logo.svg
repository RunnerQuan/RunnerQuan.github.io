<svg xmlns="http://www.w3.org/2000/svg" viewBox="28 34 456 456" role="img" aria-labelledby="title desc" shape-rendering="geometricPrecision">
  <title id="title">RunnerQuan orbital monogram</title>
  <desc id="desc">A monochrome pixel-space planet with an RQ monogram and orbit ring.</desc>
  <defs>
    <linearGradient id="moon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#a8a8a8"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="planetClip">
      <circle cx="256" cy="256" r="176"/>
    </clipPath>
  </defs>

  <circle cx="256" cy="256" r="176" fill="#050505" stroke="#ffffff" stroke-width="16"/>

  <g clip-path="url(#planetClip)">
    <path d="M261 80A176 176 0 0 1 426 244C393 205 350 179 299 163C284 137 270 109 261 80Z" fill="url(#moon)"/>
    <circle cx="337" cy="126" r="22" fill="#747474" stroke="#ffffff" stroke-width="9"/>
